services:
  mysql:
    image: mysql:8.0
    container_name: basic-api-mysql
    restart: always
    environment:
      MYSQL_DATABASE: basic_api
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3320:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: